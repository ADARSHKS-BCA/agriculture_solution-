<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Wallet Dashboard</title>

    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- Header & Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-leaf me-2"></i>Farm Wallet</a>
            <div class="d-flex gap-2">
                <!-- NEW FEATURE: Category Management Button -->
                <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#categoryModal">
                    <i class="fas fa-tags me-1"></i> Manage Categories
                </button>
                <!-- NEW FEATURE: Export PDF Button -->
                <button class="btn btn-light btn-sm" id="exportBtn">
                    <i class="fas fa-file-pdf text-danger me-1"></i> Export Report
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-4" id="dashboardContent">

        <!-- NEW FEATURE: Date Filter Bar -->
        <div class="card shadow-sm mb-4 filter-bar">
            <div class="card-body d-flex flex-wrap align-items-center gap-3">
                <div class="fw-bold text-success"><i class="fas fa-filter me-2"></i>Filters:</div>
                <select class="form-select form-select-sm w-auto" id="filterMonth">
                    <option value="all">All Months</option>
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
                <select class="form-select form-select-sm w-auto" id="filterYear">
                    <option value="all">All Years</option>
                    <!-- Populated dynamically by JS -->
                </select>
                <button class="btn btn-success btn-sm" id="applyFilterBtn">Apply Filter</button>
            </div>
        </div>

        <!-- NEW FEATURE: Clickable Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm summary-card border-success" id="cardIncome">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase fw-bold"><i
                                class="fas fa-arrow-up text-success me-2"></i>Total Income</h6>
                        <h3 class="mb-0 text-success" id="totalIncomeDisplay">₹0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm summary-card border-danger" id="cardExpense">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase fw-bold"><i
                                class="fas fa-arrow-down text-danger me-2"></i>Total Expense</h6>
                        <h3 class="mb-0 text-danger" id="totalExpenseDisplay">₹0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm summary-card border-primary" id="cardNetProfit">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase fw-bold"><i class="fas fa-wallet text-primary me-2"></i>Net
                            Profit</h6>
                        <h3 class="mb-0" id="netProfitDisplay">₹0</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column align-items-center">
                        <h6 class="card-title text-success text-center border-bottom pb-2 w-100"><i
                                class="fas fa-chart-pie me-2"></i>Expense Distribution</h6>
                        <!-- NEW FEATURE: Expense Pie Chart -->
                        <div
                            class="chart-container flex-grow-1 d-flex justify-content-center align-items-center w-100 mt-2">
                            <canvas id="expensePieChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h6 class="card-title text-success border-bottom pb-2"><i
                                class="fas fa-chart-line me-2"></i>Income vs Expense Trend</h6>
                        <div class="chart-container w-100 mt-2" style="position: relative; height:250px;">
                            <canvas id="trendLineChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="card-title text-success m-0"><i class="fas fa-list me-2"></i>Recent Transactions <span
                            id="tableFilterLabel" class="badge bg-secondary ms-2" style="display:none;">Filtered</span>
                    </h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-success">
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th class="text-end">Amount (₹)</th>
                                <!-- NEW FEATURE: Actions Column for Edit/Delete -->
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- NEW FEATURE: Floating Add Transaction Button -->
    <button class="floating-btn shadow" data-bs-toggle="modal" data-bs-target="#transactionModal"
        onclick="prepareAddForm()">
        <i class="fas fa-plus"></i>
    </button>

    <!-- NEW FEATURE: Transaction Modal (Add/Edit) -->
    <div class="modal fade" id="transactionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-success">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="transactionModalTitle">Add Transaction</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="transactionForm">
                        <input type="hidden" id="transId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" class="form-control" id="transDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Type</label>
                            <select class="form-select" id="transType" onchange="updateCategoryDropdown()" required>
                                <option value="Income">Income</option>
                                <option value="Expense">Expense</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Category</label>
                            <select class="form-select" id="transCategory" required>
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <input type="text" class="form-control" id="transDesc" placeholder="e.g., Sold wheat"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Amount (₹)</label>
                            <input type="number" class="form-control" id="transAmount" min="1" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Transaction</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- NEW FEATURE: Category Management Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-success">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Manage Categories</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCategoryForm" class="d-flex gap-2 mb-4">
                        <select class="form-select w-auto" id="newCatType">
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                        <input type="text" class="form-control" id="newCatName" placeholder="New Category" required>
                        <button type="submit" class="btn btn-success"><i class="fas fa-plus"></i></button>
                    </form>

                    <h6 class="fw-bold border-bottom pb-1">Income Categories</h6>
                    <ul class="list-group mb-3" id="incomeCatList"></ul>

                    <h6 class="fw-bold border-bottom pb-1">Expense Categories</h6>
                    <ul class="list-group" id="expenseCatList"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modular JS Files -->
    <script src="js/data.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
